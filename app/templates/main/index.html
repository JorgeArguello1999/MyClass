{% extends 'base.html' %}

{% block content %}
<div class="page-header" style="margin-top: 3rem; text-align: center;">
    <h1 style="font-size: 2.5rem; color: var(--primary-blue);">Welcome to LuminaAcademic</h1>
    <p style="font-size: 1.1rem; max-width: 600px; margin: 1rem auto 2rem;">The core of your modern academic
        intelligence hub.</p>

    {% if not current_user.is_authenticated %}
    <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="{{ url_for('auth.login') }}" class="btn-initialize"
            style="position: relative; right: auto; bottom: auto; background: var(--primary-blue); color: white; text-decoration: none;">Log
            In</a>
        <a href="{{ url_for('auth.register') }}" class="btn-initialize"
            style="position: relative; right: auto; bottom: auto; background: white; color: var(--text-sec); border: 1px solid #ddd; text-decoration: none;">Register</a>
    </div>
    {% else %}
    <a href="{{ url_for('main.dashboard') }}" class="btn-initialize"
        style="position: relative; right: auto; bottom: auto; background: var(--primary-blue); color: white; text-decoration: none;">Go
        to Dashboard</a>
    {% endif %}
</div>
{% endblock %}

{% block fab %}
<!-- No microphone fab on the index page -->
{% endblock %}
