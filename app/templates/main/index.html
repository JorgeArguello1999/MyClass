{% extends 'base.html' %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3 shadow mt-4">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold">Bienvenido a MyClass</h1>
        <p class="col-md-8 fs-4">Esta es la base de tu proyecto Flask utilizando el patrón Modelo-Vista-Controlador y SQLAlchemy.</p>
        {% if not current_user.is_authenticated %}
            <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg">Iniciar Sesión</a>
            <a href="{{ url_for('auth.register') }}" class="btn btn-outline-secondary btn-lg">Registrarse</a>
        {% else %}
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-success btn-lg">Ir al Dashboard</a>
        {% endif %}
    </div>
</div>
{% endblock %}
