{% extends 'base.html' %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3 shadow mt-4">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold">Welcome to LuminaAcademic</h1>
        <p class="col-md-8 fs-4">The core of your Flask project using the Model-View-Controller pattern and SQLAlchemy.</p>
        {% if not current_user.is_authenticated %}
            <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg">Log In</a>
            <a href="{{ url_for('auth.register') }}" class="btn btn-outline-secondary btn-lg">Register</a>
        {% else %}
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-success btn-lg">Go to Dashboard</a>
        {% endif %}
    </div>
</div>
{% endblock %}
