{% extends 'auth_base.html' %}

{% block content %}
<div class="auth-container mt-2 mb-5">
    <div class="mb-4 d-flex align-items-center mb-4">
        <div class="brand-icon-wrapper-small">
            <i class="bi bi-mortarboard-fill"></i> LuminaAcademic
        </div>
    </div>

    <div class="auth-card">
        <h1 class="auth-title-dark">Create Account</h1>
        <p class="auth-subtitle text-start mb-4">Please enter your details to get started.</p>

        <label for="profile_picture" class="profile-upload-wrapper" style="cursor: pointer; display: block; text-align: center;">
            <div class="profile-upload-circle" id="profile-preview-circle" style="margin: 0 auto;">
                <i class="bi bi-camera"></i>
            </div>
            <div class="profile-upload-title" style="margin-top: 10px;">Profile Picture (Optional)</div>
            <div class="profile-upload-sub">PNG, JPG up to 5MB.</div>
            <input type="file" id="profile_picture" name="profile_picture" accept="image/png, image/jpeg, image/jpg" style="display: none;" onchange="previewImage(this, 'profile-preview-circle')">
        </label>

        <script>
            function previewImage(input, circleId) {
                if (input.files && input.files[0]) {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var circle = document.getElementById(circleId);
                        circle.style.backgroundImage = 'url(' + e.target.result + ')';
                        circle.style.backgroundSize = 'cover';
                        circle.style.backgroundPosition = 'center';
                        circle.innerHTML = '';
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            }
        </script>

        <form method="POST" action="{{ url_for('auth.register') }}" enctype="multipart/form-data">
            <div class="auth-input-group">
                <label for="full_name" class="form-label">Full Name</label>
                <input type="text" class="form-control auth-input" id="full_name" name="full_name" placeholder="Alex Johnson" required>
                <i class="bi bi-person input-icon"></i>
            </div>

            <div class="auth-input-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control auth-input" id="email" name="email" placeholder="alex@university.edu" required>
                <i class="bi bi-envelope input-icon"></i>
            </div>
            
            <div class="auth-input-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control auth-input" id="password" name="password" placeholder="••••••••" required>
                <i class="bi bi-eye input-icon"></i>
            </div>

            <div class="auth-input-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control auth-input" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                <i class="bi bi-lock input-icon"></i>
            </div>

            <div class="form-check mt-3 mb-4">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label" for="terms" style="font-size: 0.85rem; color: var(--text-secondary);">
                    I agree to the <a href="#" style="text-decoration: none;">Terms of Service</a> and <a href="#" style="text-decoration: none;">Privacy Policy</a>.
                </label>
            </div>

            <button type="submit" class="btn btn-auth mt-2">
                <i class="bi bi-key"></i> Sign Up
            </button>
        </form>
    </div>
    
    <div class="auth-footer-link" style="margin-bottom: 2rem;">
        Already have an account?<br>
        <a href="{{ url_for('auth.login') }}" style="text-transform: uppercase; margin-top: 0.5rem; display: inline-block;">Sign In To LuminaAcademic</a>
    </div>
</div>
{% endblock %}
